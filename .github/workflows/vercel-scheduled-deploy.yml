name: Scheduled Vercel Production Deploy

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Production Deploy
        run: |
          curl -X POST "https://api.vercel.com/v13/deployments?forceNew=1" \
          -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "name": "noticiatech",
            "project": "${{ secrets.VERCEL_PROJECT_ID }}",
            "target": "production",
            "teamId": "${{ secrets.VERCEL_ORG_ID }}"
          }'