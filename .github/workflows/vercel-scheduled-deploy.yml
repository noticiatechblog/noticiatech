name: Daily Vercel Production Deploy

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC. 11:05 UTC = 08:05 em Sao Paulo.
    - cron: "5 11 * * *"
    # Segunda tentativa diaria para reduzir risco de atraso/falha temporaria.
    - cron: "35 11 * * *"

permissions:
  contents: read

concurrency:
  group: daily-vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate deploy hook
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::Missing VERCEL_DEPLOY_HOOK secret"
            exit 1
          fi

      - name: Trigger Vercel Production Deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --retry 5 \
            --retry-delay 15 \
            --retry-all-errors \
            -X POST "$VERCEL_DEPLOY_HOOK"
