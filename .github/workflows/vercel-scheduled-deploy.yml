name: Vercel Production Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "assets/**"
      - "layouts/**"
      - "themes/**"
      - "static/**"
      - "hugo.toml"
  schedule:
    # GitHub Actions usa UTC. 11:00 UTC = 08:00 em Sao Paulo.
    - cron: "0 11 * * *"

permissions:
  contents: read

concurrency:
  group: daily-vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate deploy hook
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::Missing VERCEL_DEPLOY_HOOK secret"
            exit 1
          fi

      - name: Trigger Vercel Production Deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --retry 5 \
            --retry-delay 15 \
            --retry-all-errors \
            -X POST "$VERCEL_DEPLOY_HOOK"
