name: Vercel Production Deploy

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    # 11:00 UTC = 08:00 Brasil (UTC-3)
    - cron: "0 11 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"