<div class="footer-links">
  {{ $items := site.Menus.footer }}
  {{ range $index, $item := $items }}
    <a href="{{ $item.URL | absLangURL }}">{{ $item.Name }}</a>{{ if lt $index (sub (len $items) 1) }} &middot; {{ end }}
  {{ end }}
</div>

</div>
