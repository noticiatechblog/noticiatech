<div class="comments-wrapper">

  <div class="comments-header">
    <h2>Comentários</h2>

    <p>
      Os comentários utilizam autenticação via GitHub para manter um ambiente
      mais qualificado, seguro e livre de spam.
    </p>

    <a href="https://github.com" target="_blank" rel="noopener noreferrer">
      Entrar ou criar conta no GitHub
    </a>
  </div>

  <div class="giscus"></div>

  <script>
    (function () {
      const giscusContainer = document.querySelector(".giscus");
      const themeToggle = document.getElementById("theme-toggle");

      function getGiscusTheme() {
        return document.documentElement.dataset.theme === "dark"
          ? "dark"
          : "light";
      }

      function setGiscusTheme() {
        const iframe = document.querySelector("iframe.giscus-frame");

        if (!iframe) return;

        iframe.contentWindow.postMessage(
          {
            giscus: {
              setConfig: {
                theme: getGiscusTheme(),
              },
            },
          },
          "https://giscus.app"
        );
      }

      // CRIA SCRIPT DO GISCUS
      const script = document.createElement("script");

      script.src = "https://giscus.app/client.js";

      script.setAttribute(
        "data-repo",
        "noticiatechblog/noticiatech-comments"
      );

      script.setAttribute(
        "data-repo-id",
        "R_kgDOSl3Tmw"
      );

      script.setAttribute(
        "data-category",
        "Comments"
      );

      script.setAttribute(
        "data-category-id",
        "DIC_kwDOSl3Tm84C96Fm"
      );

      script.setAttribute(
        "data-mapping",
        "pathname"
      );

      script.setAttribute(
        "data-strict",
        "0"
      );

      script.setAttribute(
        "data-reactions-enabled",
        "1"
      );

      script.setAttribute(
        "data-emit-metadata",
        "1"
      );

      script.setAttribute(
        "data-input-position",
        "top"
      );

      script.setAttribute(
        "data-theme",
        "preferred_color_scheme"
      );

      script.setAttribute(
        "data-lang",
        "pt"
      );

      script.setAttribute(
        "crossorigin",
        "anonymous"
      );

      script.async = true;

      giscusContainer.appendChild(script);

      window.addEventListener("message", function (event) {
        if (
          event.origin === "https://giscus.app" &&
          event.data &&
          event.data.giscus
        ) {
          setGiscusTheme();
        }
      });

      if (themeToggle) {
        themeToggle.addEventListener("click", function () {
          window.setTimeout(setGiscusTheme, 0);
        });
      }
    })();
  </script>

</div>
