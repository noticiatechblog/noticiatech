baseURL = "https://noticiatech.com.br/"
languageCode = "pt-br"
relativeURLs = false
canonifyURLs = true
defaultContentLanguage = "pt-br"
title = "Notícia Tech | IA e Automação para Negócios"
theme = "PaperMod"

enableRobotsTXT = true

# ===== PUBLICAÇÃO =====
buildDrafts = false
buildFuture = false
buildExpired = false

# ===== CORREÇÃO DO HTML NOS ARTIGOS =====
[markup.goldmark.renderer]
  unsafe = true

# ===== IGNORAR WARNINGS DO LOG =====
ignoreLogs = ['warning-goldmark-raw-html']

# ===== CONFIGURAÇÕES GERAIS =====
[pagination]
  pagerSize = 10

# ===== SITEMAP =====
[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"
  disableKinds = ["taxonomy", "term"]

# ===== IDIOMAS =====
[languages]
  [languages.pt-br]
    languageCode = "pt-BR"
    languageName = "Português"
    weight = 1
    contentDir = "content"
    [languages.pt-br.params]
      description = "Portal de notícias, análises e aplicações de inteligência artificial, automação, ferramentas e negócios."
      languageAltTitle = "Versão em português"
      mainSections = ["inteligencia-artificial", "automacao", "ferramentas", "negocios"]

  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    [languages.en.params]
      description = "News, analysis and AI applications for business, automation, tools and technology."
      languageAltTitle = "English version"
      mainSections = ["artificial-intelligence", "automation", "tools", "business"]

# ===== PARÂMETROS DO TEMA =====
[params]
  comments = true
  
  env = "production"
  description = "Portal de notícias, análises e aplicações de inteligência artificial, automação, ferramentas e negócios."
  keywords = ["IA", "Automação", "Ferramentas", "Negócios", "Tecnologia"]

  ShowSearch = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  hideFooter = false
  ShowPostCover = true
  ShowPostCoverInList = true

  defaultTheme = "auto"
  disableThemeToggle = false

  ShowMenuItems = 4
  displayFullLangName = true

  # CSS customizado
  customCSS = ["css/extended/custom.css"]

# ===== FAVICON =====
[params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"

# ===== LOGO =====
[params.label]
  text = ""
  icon = "images/logo.png"
  iconHeight = 40

# ===== MENU PRINCIPAL =====
[menu]

[[menu.main]]
name = "Início"
url = "/"
identifier = "inicio"
weight = 1

[[menu.main]]
name = "IA"
url = "inteligencia-artificial/"
identifier = "inteligencia-artificial"
weight = 2

[[menu.main]]
name = "Automação"
url = "automacao/"
identifier = "automacao"
weight = 3

[[menu.main]]
name = "Ferramentas"
url = "ferramentas/"
identifier = "ferramentas"
weight = 4

[[menu.main]]
name = "Negócios"
url = "negocios/"
identifier = "negocios"
weight = 5

[languages.en.menu]
[[languages.en.menu.main]]
name = "Home"
url = "/"
identifier = "home"
weight = 1

[[languages.en.menu.main]]
name = "AI"
url = "artificial-intelligence/"
identifier = "artificial-intelligence"
weight = 2

[[languages.en.menu.main]]
name = "Automation"
url = "automation/"
identifier = "automation"
weight = 3

[[languages.en.menu.main]]
name = "Tools"
url = "tools/"
identifier = "tools"
weight = 4

[[languages.en.menu.main]]
name = "Business"
url = "business/"
identifier = "business"
weight = 5

[[languages.en.menu.footer]]
name = "About"
url = "/about/"
weight = 1

[[languages.en.menu.footer]]
name = "Contact"
url = "/contact/"
weight = 2

[[languages.en.menu.footer]]
name = "Privacy Policy"
url = "/privacy-policy/"
weight = 3

[[languages.en.menu.footer]]
name = "Terms of Use"
url = "/terms-of-use/"
weight = 4

[[languages.en.menu.footer]]
name = "Disclaimer"
url = "/disclaimer/"
weight = 5

# ===== OUTPUTS =====
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ===== CASCADE PARA PÁGINAS DE CATEGORIA =====
[[cascade]]
  [cascade._target]
    path = '/categories'
  [cascade.params]
    robotsNoIndex = true
  [cascade.sitemap]
    disable = true

[[cascade]]
  [cascade._target]
    path = '/categories/**'
  [cascade.params]
    robotsNoIndex = true
  [cascade.sitemap]
    disable = true

# ===== TAXONOMIAS =====
[taxonomies]
  category = "categories"
  tag = "tags"

# ===== MENU FOOTER =====
[[menu.footer]]
name = "Sobre"
url = "/sobre/"
weight = 1

[[menu.footer]]
name = "Contato"
url = "/contato/"
weight = 2

[[menu.footer]]
name = "Política de Privacidade"
url = "/politica-de-privacidade/"
weight = 3

[[menu.footer]]
name = "Termos de Uso"
url = "/termos-de-uso/"
weight = 4

[[menu.footer]]
