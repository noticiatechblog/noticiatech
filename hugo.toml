baseURL = "https://noticiatech.com.br/"
languageCode = "pt-br"
relativeURLs = false
canonifyURLs = false
defaultContentLanguage = "pt-br"
title = " "
theme = "PaperMod"

# ===== CONFIGURAÇÕES GERAIS =====
[pagination]
  pagerSize = 10

enableRobotsTXT = true

# ===== PARÂMETROS DO TEMA =====
[params]
  ShowSearch = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  hideFooter = false
  ShowPostCover = true
  ShowPostCoverInList = true

  favicon = "images/favicon.png"

  defaultTheme = "auto"
  disableThemeToggle = false

  ShowMenuItems = 4

  # POSTS NA HOME
  mainSections = ["inteligencia-artificial", "automacao", "marketing", "negocios"]

  # 👉 SEU CSS (AQUI DENTRO, NÃO EM OUTRO [params])
  customCSS = ["css/extended/custom.css"]

# ===== LOGO =====
[params.label]
  text = ""
  icon = "images/logo.png"
  iconHeight = 40

# ===== MENU PRINCIPAL =====
[menu]

[[menu.main]]
name = "Início"
url = "/"
identifier = "inicio"
weight = 1

[[menu.main]]
name = "IA"
url = "/inteligencia-artificial/"
identifier = "inteligencia-artificial"
weight = 2

[[menu.main]]
name = "Automação"
url = "/automacao/"
identifier = "automacao"
weight = 3

[[menu.main]]
name = "Marketing"
url = "/marketing/"
identifier = "marketing"
weight = 4

[[menu.main]]
name = "Negócios"
url = "/negocios/"
identifier = "negocios"
weight = 5

# ===== OUTPUTS =====
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ===== TAXONOMIAS =====
[taxonomies]
  category = "categories"
  tag = "tags"

# ===== MENU FOOTER =====
[[menu.footer]]
  name = "Sobre"
  url = "/sobre/"
  weight = 1

[[menu.footer]]
  name = "Contato"
  url = "/contato/"
  weight = 2

[[menu.footer]]
  name = "Política de Privacidade"
  url = "/politica-de-privacidade/"
  weight = 3

[[menu.footer]]
  name = "Termos de Uso"
  url = "/termos-de-uso/"
  weight = 4

[[menu.footer]]
  name = "Disclaimer"
  url = "/disclaimer/"
  weight = 5